<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A Surprise For You 🎀</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --rose: #e8516a;
      --deep: #c0324f;
      --blush: #fde8ec;
      --petal: #fbbdcc;
      --gold: #d4af7a;
      --dark: #1a0a10;
      --cream: #fff8f9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: var(--dark);
      font-family: 'Cormorant Garamond', serif;
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Starfield background */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--d) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.1; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1.2); }
    }

    /* Floating petals */
    .petal-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }
    .petal {
      position: absolute;
      top: -60px;
      font-size: clamp(16px, 2vw, 28px);
      animation: fall linear infinite;
      opacity: 0.7;
    }
    @keyframes fall {
      0%   { transform: translateY(-60px) rotate(0deg); opacity: 0.8; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* Main scene */
    .scene {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      padding: 32px 20px;
    }

    .intro-text {
      color: var(--petal);
      font-family: 'Dancing Script', cursive;
      font-size: clamp(18px, 4vw, 28px);
      letter-spacing: 0.05em;
      text-align: center;
      animation: fadeSlideDown 1.2s ease both;
      text-shadow: 0 0 30px rgba(232, 81, 106, 0.6);
    }
    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Envelope / Card wrapper */
    .envelope-wrap {
      perspective: 1000px;
      animation: fadeIn 1.5s ease 0.4s both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    .envelope {
      width: clamp(280px, 85vw, 420px);
      height: clamp(200px, 55vw, 300px);
      position: relative;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.2s ease;
    }
    .envelope:hover { transform: scale(1.03) rotateX(2deg); }

    .env-body {
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #7a1030, #c0324f, #e8516a);
      border-radius: 12px;
      box-shadow:
        0 30px 80px rgba(192,50,79,0.5),
        0 0 0 1px rgba(212,175,122,0.3),
        inset 0 1px 0 rgba(255,255,255,0.15);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .env-body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 10px,
        rgba(255,255,255,0.03) 10px,
        rgba(255,255,255,0.03) 11px
      );
    }

    /* Envelope flap */
    .env-flap {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 55%;
      background: linear-gradient(160deg, #8f1535, #b02a45);
      clip-path: polygon(0 0, 50% 65%, 100% 0);
      transform-origin: top center;
      transition: transform 0.6s cubic-bezier(.4,0,.2,1);
      z-index: 5;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .envelope.open .env-flap {
      transform: rotateX(-180deg);
    }

    /* Heart on envelope */
    .env-heart {
      font-size: 52px;
      z-index: 2;
      position: relative;
      animation: heartbeat 1.5s ease-in-out infinite;
      filter: drop-shadow(0 0 16px rgba(255,150,170,0.8));
    }
    @keyframes heartbeat {
      0%,100% { transform: scale(1); }
      14%      { transform: scale(1.18); }
      28%      { transform: scale(1); }
      42%      { transform: scale(1.12); }
      56%      { transform: scale(1); }
    }

    /* Wax seal */
    .wax-seal {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 56px; height: 56px;
      background: radial-gradient(circle at 35% 35%, #d4af7a, #8b6914);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 0 3px rgba(212,175,122,0.4);
      z-index: 10;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .wax-seal:hover { transform: translateX(-50%) scale(1.1) rotate(10deg); }

    /* Open button */
    .open-btn {
      background: linear-gradient(135deg, var(--rose), var(--deep));
      color: white;
      border: none;
      padding: 16px 52px;
      font-family: 'Dancing Script', cursive;
      font-size: clamp(20px, 4vw, 26px);
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.05em;
      box-shadow:
        0 8px 32px rgba(232,81,106,0.5),
        0 0 0 1px rgba(212,175,122,0.3);
      transition: all 0.3s ease;
      animation: pulseGlow 2.5s ease-in-out infinite, fadeIn 1.5s ease 0.8s both;
      position: relative;
      overflow: hidden;
    }
    .open-btn::before {
      content: '';
      position: absolute;
      inset: -2px;
      background: linear-gradient(135deg, var(--gold), transparent, var(--gold));
      border-radius: inherit;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: -1;
    }
    .open-btn:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 16px 48px rgba(232,81,106,0.7);
    }
    .open-btn:hover::before { opacity: 0.4; }

    @keyframes pulseGlow {
      0%,100% { box-shadow: 0 8px 32px rgba(232,81,106,0.5), 0 0 0 1px rgba(212,175,122,0.3); }
      50%      { box-shadow: 0 8px 50px rgba(232,81,106,0.8), 0 0 30px rgba(232,81,106,0.4), 0 0 0 1px rgba(212,175,122,0.5); }
    }

    /* Card popup overlay */
    .card-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,2,6,0.88);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      padding: 20px;
    }
    .card-overlay.show {
      display: flex;
      animation: overlayIn 0.5s ease both;
    }
    @keyframes overlayIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .card {
      background: linear-gradient(160deg, #fff8f0, #ffe8ef, #fff8f0);
      border-radius: 20px;
      max-width: 480px;
      width: 100%;
      padding: 52px 40px 44px;
      text-align: center;
      position: relative;
      box-shadow:
        0 40px 100px rgba(0,0,0,0.6),
        0 0 0 1px rgba(212,175,122,0.5);
      animation: cardPop 0.6s cubic-bezier(.17,.67,.21,1.3) both;
      overflow: visible;
    }
    @keyframes cardPop {
      from { opacity: 0; transform: scale(0.6) rotateY(-15deg); }
      to   { opacity: 1; transform: scale(1) rotateY(0deg); }
    }

    .card::before {
      content: '';
      position: absolute;
      inset: -2px;
      background: linear-gradient(135deg, var(--gold), transparent 40%, var(--rose), transparent 70%, var(--gold));
      border-radius: 22px;
      z-index: -1;
    }

    /* Confetti burst */
    .confetti-burst {
      position: absolute;
      top: -20px; left: 50%;
      transform: translateX(-50%);
      font-size: 32px;
      pointer-events: none;
    }
    .confetti-burst span {
      display: inline-block;
      animation: confettiFly 1.2s ease-out var(--delay) both;
    }
    @keyframes confettiFly {
      from { transform: translate(0,0) rotate(0deg); opacity: 1; }
      to   { transform: translate(var(--tx), var(--ty)) rotate(720deg); opacity: 0; }
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 6vw, 42px);
      color: var(--deep);
      line-height: 1.15;
      margin-bottom: 16px;
    }

    .card-hearts {
      font-size: 32px;
      margin: 10px 0;
      animation: heartbeat 1.5s ease-in-out infinite;
      display: block;
    }

    .card-msg {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(16px, 3vw, 20px);
      color: #5a1a2a;
      line-height: 1.75;
      margin: 18px 0 28px;
      font-style: italic;
    }

    .card-to-letter {
      display: inline-block;
      padding: 14px 44px;
      background: linear-gradient(135deg, var(--rose), var(--deep));
      color: white;
      border: none;
      border-radius: 50px;
      font-family: 'Dancing Script', cursive;
      font-size: clamp(18px, 3.5vw, 22px);
      cursor: pointer;
      box-shadow: 0 8px 28px rgba(192,50,79,0.45);
      transition: all 0.3s ease;
      text-decoration: none;
    }
    .card-to-letter:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 40px rgba(192,50,79,0.6);
    }

    .card-decor {
      position: absolute;
      font-size: 28px;
      animation: float 3s ease-in-out infinite alternate;
      pointer-events: none;
    }
    @keyframes float {
      from { transform: translateY(0) rotate(-5deg); }
      to   { transform: translateY(-12px) rotate(5deg); }
    }

    /* Ribbon */
    .ribbon {
      position: absolute;
      top: -1px; left: 50%;
      transform: translateX(-50%);
      width: 60px; height: 26px;
      background: var(--rose);
      border-radius: 0 0 50% 50%;
      box-shadow: 0 4px 12px rgba(232,81,106,0.4);
    }
    .ribbon::before, .ribbon::after {
      content: '';
      position: absolute;
      top: 0;
      width: 32px; height: 24px;
      background: var(--deep);
      border-radius: 0 50% 50% 0;
      transform-origin: left center;
    }
    .ribbon::before { left: -28px; transform: rotate(-25deg); }
    .ribbon::after  { right: -28px; transform: rotate(25deg) scaleX(-1); border-radius: 50% 0 0 50%; }

    /* Sparkles */
    .sparkle {
      position: fixed;
      pointer-events: none;
      z-index: 1000;
      animation: sparkleOut 0.8s ease-out forwards;
      font-size: 20px;
    }
    @keyframes sparkleOut {
      0%   { transform: scale(0) rotate(0deg); opacity: 1; }
      50%  { transform: scale(1.5) rotate(180deg); opacity: 1; }
      100% { transform: scale(0) rotate(360deg); opacity: 0; }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .card { padding: 40px 24px 36px; }
    }
  </style>
</head>
<body>

<!-- Background stars -->
<div class="stars" id="stars"></div>

<!-- Floating petals -->
<div class="petal-container" id="petals"></div>

<!-- Background music -->
<audio id="bgMusic" loop>
  <source src="musicpage1.mp3" type="audio/mpeg">
</audio>

<!-- Main scene -->
<div class="scene">
  <div class="intro-text">✨ Something special is waiting for you… ✨</div>

  <div class="envelope-wrap">
    <div class="envelope" id="envelope">
      <div class="env-body">
        <div class="env-heart">💌</div>
      </div>
      <div class="env-flap"></div>
      <div class="wax-seal" title="Click to open">🌹</div>
    </div>
  </div>

  <button class="open-btn" id="openBtn" onclick="openCard()">
    Open Your Surprise 🎀
  </button>
</div>

<!-- Card popup -->
<div class="card-overlay" id="cardOverlay">
  <div class="card" id="surpriseCard">
    <div class="ribbon"></div>

    <div class="card-decor" style="top:20px;right:20px;--delay:0s">🌸</div>
    <div class="card-decor" style="top:20px;left:20px;animation-delay:1s;--delay:1s">✨</div>
    <div class="card-decor" style="bottom:60px;right:16px;animation-delay:0.5s">🌺</div>
    <div class="card-decor" style="bottom:60px;left:16px;animation-delay:1.5s">💫</div>

    <div class="confetti-burst" id="confettiBurst"></div>

    <h1 class="card-title">Happy Birthday,<br/><em>My Shagane 🌹</em></h1>
    <span class="card-hearts">💖 💕 💗</span>
    <p class="card-msg">
      "Today the universe paused just to celebrate<br/>
      the most beautiful soul it ever created — you."
    </p>

    <a class="card-to-letter" href="letter.html">
      Read My Letter to You 💌
    </a>
  </div>
</div>

<script>
  // Generate stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 160; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%; top:${Math.random()*100}%;
      --d:${(Math.random()*3+1).toFixed(1)}s;
      animation-delay:${(Math.random()*4).toFixed(1)}s;
    `;
    starsEl.appendChild(s);
  }

  // Generate petals
  const petalContainer = document.getElementById('petals');
  const petalEmojis = ['🌸','🌺','🌹','💮','🏵️','✨','💫'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = petalEmojis[Math.floor(Math.random()*petalEmojis.length)];
    const dur = (Math.random()*8+6).toFixed(1);
    p.style.cssText = `
      left:${Math.random()*100}%;
      animation-duration:${dur}s;
      animation-delay:${(Math.random()*8).toFixed(1)}s;
      font-size:${Math.random()*16+14}px;
    `;
    petalContainer.appendChild(p);
  }

  // Try playing music
  document.addEventListener('click', () => {
    const m = document.getElementById('bgMusic');
    if (m && m.paused) m.play().catch(()=>{});
  }, { once: true });

  // Envelope click
  document.getElementById('envelope').addEventListener('click', openCard);

  function openCard() {
    document.getElementById('envelope').classList.add('open');
    setTimeout(() => {
      document.getElementById('cardOverlay').classList.add('show');
      launchConfetti();
      spawnSparkles();
    }, 500);
  }

  function launchConfetti() {
    const burst = document.getElementById('confettiBurst');
    const items = ['🎉','🎊','✨','💖','🌸','🥳','💫','🎈'];
    burst.innerHTML = '';
    for (let i = 0; i < 12; i++) {
      const span = document.createElement('span');
      span.textContent = items[Math.floor(Math.random()*items.length)];
      const angle = (i / 12) * 360;
      const dist = 80 + Math.random() * 60;
      const rad = angle * Math.PI / 180;
      span.style.setProperty('--tx', `${Math.cos(rad)*dist}px`);
      span.style.setProperty('--ty', `${Math.sin(rad)*dist - 40}px`);
      span.style.setProperty('--delay', `${i * 0.05}s`);
      burst.appendChild(span);
    }
  }

  function spawnSparkles() {
    const sparkles = ['✨','💖','🌟','💕','🌸'];
    for (let i = 0; i < 14; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'sparkle';
        el.textContent = sparkles[Math.floor(Math.random()*sparkles.length)];
        el.style.left = Math.random()*90 + 5 + 'vw';
        el.style.top  = Math.random()*80 + 10 + 'vh';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 900);
      }, i * 120);
    }
  }

  // Close overlay clicking outside card
  document.getElementById('cardOverlay').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('show');
  });
</script>
</body>
</html>
